[package]
authors              = ["Federico Hoerth <memparanoid@gmail.com>"]
categories           = ["cryptography", "memory-management"]
description          = "Core implementation for redoubt-vault encrypted storage"
edition.workspace    = true
keywords             = ["vault", "encryption", "secrets", "aead", "zeroize"]
license.workspace    = true
name                 = "redoubt-vault-core"
readme.workspace     = true
repository.workspace = true
version.workspace    = true

[lib]
path = "src/lib.rs"

[features]
asm                = ["redoubt-rand/asm", "redoubt-aead/asm"]
default            = []
guard              = ["redoubt-guard/guard"]
internal-forensics = []
std                = []

[dependencies]
redoubt-aead.workspace   = true
redoubt-alloc.workspace  = true
redoubt-buffer.workspace = true
redoubt-codec            = { workspace = true, features = ["zeroize"] }
redoubt-guard.workspace  = true
redoubt-rand.workspace   = true
redoubt-secret.workspace = true
redoubt-zero.workspace   = true
thiserror.workspace      = true

[dev-dependencies]
redoubt-aead                 = { workspace = true, features = ["test-utils"] }
redoubt-codec                = { workspace = true, features = ["test-utils"] }
redoubt-test-utils.workspace = true
redoubt-util.workspace       = true


[target.'cfg(unix)'.dev-dependencies]
libc.workspace = true

[target.'cfg(target_os = "linux")'.dev-dependencies]
libseccomp.workspace = true
