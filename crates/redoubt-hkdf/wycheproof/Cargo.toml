[package]
name                 = "redoubt-hkdf-wycheproof"
authors              = ["Federico Hoerth <memparanoid@gmail.com>"]
categories           = ["cryptography"]
description          = "Wycheproof test runners and FIPS vectors for HKDF-SHA256 backends"
edition.workspace    = true
keywords             = ["hkdf", "sha256", "testing", "wycheproof"]
license.workspace    = true
readme.workspace     = true
repository.workspace = true
version.workspace    = true

[lib]
path = "src/lib.rs"

[dependencies]
redoubt-hkdf-core.workspace = true
redoubt-util = { workspace = true, features = ["test-utils"] }
