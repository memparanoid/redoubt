[package]
name                 = "redoubt-hkdf-core"
authors              = ["Federico Hoerth <memparanoid@gmail.com>"]
categories           = ["cryptography"]
description          = "Core traits, pure Rust implementation, and test infrastructure for HKDF-SHA256"
edition.workspace    = true
keywords             = ["hkdf", "sha256", "crypto", "testing"]
license.workspace    = true
readme.workspace     = true
repository.workspace = true
version.workspace    = true

[lib]
path = "src/lib.rs"

[dependencies]
redoubt-zero.workspace = true
redoubt-util.workspace = true
thiserror.workspace    = true

[dev-dependencies]
redoubt-util = { workspace = true, features = ["test-utils"] }

[features]
default = []
test-utils = ["redoubt-util/test-utils"]
